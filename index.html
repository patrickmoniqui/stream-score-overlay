<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Keylight Stream Tools</title>
    <meta name="description" content="Keylight stream tools for OBS and browser sources." />
    <script>
      const pathname = window.location.pathname;
      const pathSegments = pathname.split('/').filter(Boolean);
      const trailingSegment = pathSegments[pathSegments.length - 1];
      const needsDirectorySlash =
        !pathname.endsWith('/') &&
        ['admin', 'game-score'].includes(trailingSegment);

      if (needsDirectorySlash) {
        const target = new URL(`${trailingSegment}/`, window.location.href);
        target.search = window.location.search;
        target.hash = window.location.hash;
        window.location.replace(target.toString());
      } else {
        const normalizedPath = pathname.endsWith('/')
          ? pathname
          : `${pathname}/`;
        const isKnownToolPath =
          normalizedPath.includes('/game-score/') ||
          normalizedPath.includes('/admin/');

        if (!isKnownToolPath) {
          const target = new URL('game-score/', window.location.href);
          target.search = window.location.search;
          target.hash = window.location.hash;
          window.location.replace(target.toString());
        }
      }
    </script>
  </head>
  <body>
    <p><a href="./game-score/">Open Game Score</a></p>
  </body>
</html>
